<mat-toolbar class="navbar">
  <div class="navbar-brand">
    <span class="logo-icon">◈</span>
    <div class="brand-text">
      <span class="brand-name">TaskFlow</span>
      <span class="brand-sub">Productivity Tracker</span>
    </div>
  </div>

  <span class="spacer"></span>

  <nav class="nav-links">
    <a mat-button routerLink="/tasks" routerLinkActive="active-link">
      All Tasks
      <span class="badge" *ngIf="activeCount > 0">{{ activeCount }}</span>
    </a>
    <a mat-button routerLink="/completed" routerLinkActive="active-link">
      Completed
    </a>
    <a mat-raised-button color="primary" routerLink="/add" class="add-task-btn">
      + Add Task
    </a>
  </nav>

  <div class="overdue-alert" *ngIf="overdueCount > 0">
    ⚠ {{ overdueCount }} overdue
  </div>

  <!-- User chip removed -->
</mat-toolbar>
